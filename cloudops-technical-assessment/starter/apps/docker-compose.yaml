services:
  postgres:
    image: postgres:18-alpine
    container_name: order-history-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      # Runs once on first DB init (empty data dir). Required for order-history API + projections.
      - ./order-history-service/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_history"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  dynamodb-local:
    image: amazon/dynamodb-local:3.3.0
    container_name: dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "./data"]
    ports:
      - "8000:8000"
    volumes:
      - ./dynamodb-data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal
    healthcheck:
      test: ["CMD-SHELL", 'if [ "$(curl -s -o /dev/null -I -w ''%{http_code}'' http://localhost:8000)" == "400" ]; then exit 0; else exit 1; fi']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - microservices-net

  dynamodb-init:
    build:
      context: ./scripts
      dockerfile: Dockerfile.init
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - microservices-net

  order-api:
    container_name: order-api
    build:
      context: ./order-api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - ORDER_PROCESSOR_URL=http://order-processor:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
      order-processor:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - microservices-net
    volumes:
      - ./order-api/src:/app:ro

  order-processor:
    container_name: order-processor
    build:
      context: ./order-processor
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - ORDER_HISTORY_URL=http://order-history-service:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
      order-history-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - microservices-net
    volumes:
      - ./order-processor/src:/app:ro

  order-history-service:
    container_name: order-history-service
    build:
      context: ./order-history-service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DEFAULT_PAGE_SIZE=20

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - microservices-net
    volumes:
      - ./order-history-service/src:/app:ro

networks:
  microservices-net:
    driver: bridge
